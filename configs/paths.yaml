# =============================================================================
# configs/paths.yaml — Centralised path configuration
# All paths are relative to the project root unless overridden by environment
# variables DATA_ROOT or OUTPUTS_ROOT.
# =============================================================================

paths:
  # ---------------------------------------------------------------------------
  # Data directories
  # ---------------------------------------------------------------------------
  data_root: data
  raw_root: data/raw
  processed_root: data/processed

  # Per-dataset raw directories
  italian_raw: data/raw/italian
  mdvr_kcl_raw: data/raw/mdvr_kcl
  future_dataset_raw: data/raw/future_dataset

  # Per-dataset processed directories
  italian_processed: data/processed/italian
  mdvr_kcl_processed: data/processed/mdvr_kcl

  # Manifest files (generated by preprocessing pipeline)
  italian_manifest: data/processed/italian_manifest.csv
  mdvr_kcl_manifest: data/processed/mdvr_kcl_manifest.csv

  # ---------------------------------------------------------------------------
  # Output directories
  # ---------------------------------------------------------------------------
  outputs_root: outputs
  models_dir: outputs/models
  reports_dir: outputs/reports
  figures_dir: outputs/figures

  # ---------------------------------------------------------------------------
  # Experiment tracking
  # ---------------------------------------------------------------------------
  mlflow_tracking_dir: mlruns
  mlflow_experiments_dir: mlruns/experiments

  # ---------------------------------------------------------------------------
  # Logging
  # ---------------------------------------------------------------------------
  logs_dir: logs
