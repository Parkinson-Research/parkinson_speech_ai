name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-type-check:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install quality tools
        run: |
          pip install --upgrade pip
          pip install black isort ruff mypy

      - name: Run Black
        run: black --check src/ tests/ scripts/

      - name: Run isort
        run: isort --check-only src/ tests/ scripts/

      - name: Run Ruff
        run: ruff check src/ tests/ scripts/

      - name: Run mypy
        run: mypy src/
        continue-on-error: true  # Remove once type annotations are complete

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint-and-type-check

    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg libsndfile1

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Run tests (unit only)
        run: pytest tests/ -m "not integration and not gpu" --cov=src --cov-report=xml -v

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
